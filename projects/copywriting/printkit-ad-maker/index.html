<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrintKit Ad Maker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Serif&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --font: 'Inter', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --black: #0a0a0a;
  --white: #ffffff;
  --zinc-50: #fafafa;
  --zinc-100: #f4f4f5;
  --zinc-200: #e4e4e7;
  --zinc-300: #d4d4d8;
  --zinc-400: #a1a1aa;
  --zinc-500: #71717a;
  --zinc-600: #52525b;
  --zinc-700: #3f3f46;
  --zinc-800: #27272a;
  --zinc-900: #18181b;
  --green: #22c55e;
  --green-dark: #16a34a;
  --blue: #3b82f6;
  --purple: #a855f7;
  --orange: #f97316;
  --red: #ef4444;
}

html { -webkit-font-smoothing: antialiased; }
body { font-family: var(--font); background: #e4e4e7; color: var(--black); min-height: 100vh; }

/* ===== LAYOUT ===== */
.app {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

.app.gallery-mode { display: none; }

/* ===== CANVAS AREA ===== */
.canvas-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  background: #d4d4d8;
  background-image: radial-gradient(circle, #a1a1aa 1px, transparent 1px);
  background-size: 20px 20px;
}

.ad-frame {
  width: 540px;
  height: 540px;
  position: relative;
  box-shadow: 0 25px 80px rgba(0,0,0,0.25), 0 0 0 1px rgba(0,0,0,0.08);
  border-radius: 4px;
  overflow: hidden;
  flex-shrink: 0;
}

.ad-content {
  width: 1080px;
  height: 1080px;
  transform: scale(0.5);
  transform-origin: top left;
  position: absolute;
  top: 0;
  left: 0;
  overflow: hidden;
}

/* ===== TOOLBAR ===== */
.toolbar {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  align-items: center;
  background: var(--white);
  padding: 8px 12px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06);
}

.toolbar-btn {
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  color: var(--zinc-600);
  background: var(--zinc-50);
  border: 1px solid var(--zinc-200);
  border-radius: 8px;
  padding: 8px 14px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}

.toolbar-btn:hover { border-color: var(--zinc-400); color: var(--black); background: var(--white); }
.toolbar-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }

.toolbar-btn.export-btn {
  background: var(--green);
  color: white;
  border-color: var(--green);
  font-weight: 600;
}
.toolbar-btn.export-btn:hover { background: var(--green-dark); border-color: var(--green-dark); }

.toolbar-btn.fave-btn {
  background: #fef3c7;
  color: #92400e;
  border-color: #fbbf24;
  font-weight: 600;
}
.toolbar-btn.fave-btn:hover { background: #fde68a; }

.toolbar-sep {
  width: 1px;
  height: 24px;
  background: var(--zinc-200);
  flex-shrink: 0;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 360px;
  background: var(--white);
  border-left: 1px solid var(--zinc-200);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

.sidebar-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--zinc-100);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.sidebar-title {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.sidebar-tabs {
  display: flex;
  gap: 2px;
  padding: 0 20px;
  border-bottom: 1px solid var(--zinc-100);
}

.sidebar-tab {
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  color: var(--zinc-400);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 10px 12px;
  cursor: pointer;
  transition: all 0.15s;
}

.sidebar-tab:hover { color: var(--zinc-600); }
.sidebar-tab.active { color: var(--black); border-bottom-color: var(--black); }

.sidebar-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
}

/* Copy options in sidebar */
.copy-section { margin-bottom: 20px; }

.copy-section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--zinc-400);
  margin-bottom: 8px;
}

.copy-nav {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 8px;
}

.copy-nav-arrow {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: var(--zinc-400);
  background: var(--zinc-50);
  border: 1px solid var(--zinc-200);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}
.copy-nav-arrow:hover { background: var(--zinc-100); color: var(--black); }

.copy-current {
  flex: 1;
  font-size: 13px;
  line-height: 1.4;
  color: var(--black);
  padding: 6px 10px;
  background: var(--zinc-50);
  border-radius: 6px;
  border: 1px solid var(--zinc-200);
  min-height: 36px;
  cursor: pointer;
  transition: all 0.15s;
}
.copy-current:hover { border-color: var(--zinc-400); }

.copy-counter {
  font-size: 11px;
  color: var(--zinc-400);
  font-variant-numeric: tabular-nums;
  min-width: 36px;
  text-align: center;
  flex-shrink: 0;
}

.copy-list {
  display: none;
  max-height: 200px;
  overflow-y: auto;
  border: 1px solid var(--zinc-200);
  border-radius: 8px;
  margin-top: 6px;
}
.copy-list.open { display: block; }

.copy-option {
  padding: 8px 12px;
  font-size: 12px;
  line-height: 1.4;
  color: var(--zinc-600);
  cursor: pointer;
  border-bottom: 1px solid var(--zinc-50);
  transition: background 0.1s;
}
.copy-option:last-child { border-bottom: none; }
.copy-option:hover { background: var(--zinc-50); }
.copy-option.selected { background: #f0fdf4; color: var(--black); font-weight: 500; }

/* Scene picker */
.scene-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.scene-card {
  background: var(--zinc-50);
  border: 2px solid var(--zinc-200);
  border-radius: 10px;
  padding: 14px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}
.scene-card:hover { border-color: var(--zinc-400); }
.scene-card.active { border-color: var(--black); background: var(--zinc-900); color: var(--white); }

.scene-icon {
  font-size: 28px;
  margin-bottom: 6px;
  display: block;
  line-height: 1;
}

.scene-name {
  font-size: 12px;
  font-weight: 600;
}

/* Logo toggle */
.logo-toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 16px;
  padding: 10px 12px;
  background: var(--zinc-50);
  border: 1px solid var(--zinc-200);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
}
.logo-toggle:hover { border-color: var(--zinc-400); }
.logo-toggle.active { border-color: var(--green); background: #f0fdf4; }

.logo-toggle-check {
  width: 18px;
  height: 18px;
  border: 2px solid var(--zinc-300);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.logo-toggle.active .logo-toggle-check {
  background: var(--green);
  border-color: var(--green);
}

.logo-toggle-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--zinc-600);
}
.logo-toggle.active .logo-toggle-label { color: var(--black); }

/* ============================================ */
/* AD SCENE STYLES                              */
/* ============================================ */

/* SPS Heart SVG inline */
.sps-heart-logo {
  display: none;
}
.sps-heart-logo.show {
  display: inline-block;
}

/* --- SCENE: Agent Terminal --- */
.scene-terminal {
  background: #0c0c0c;
  color: #e4e4e7;
  font-family: var(--mono);
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100%;
  padding: 80px;
}

.scene-terminal .term-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 22px;
  font-weight: 500;
  color: var(--green);
  border: 2px solid rgba(34,197,94,0.3);
  border-radius: 100px;
  padding: 8px 24px;
  margin-bottom: 48px;
  width: fit-content;
  font-family: var(--mono);
}

.scene-terminal .term-pill .dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.scene-terminal .ad-headline {
  font-family: var(--font);
  font-size: 82px;
  font-weight: 700;
  line-height: 1.05;
  letter-spacing: -3px;
  color: var(--white);
  margin-bottom: 40px;
  max-width: 900px;
}

.scene-terminal .ad-subhead {
  font-family: var(--font);
  font-size: 30px;
  line-height: 1.5;
  color: #a1a1aa;
  max-width: 800px;
  margin-bottom: auto;
}

.scene-terminal .term-window {
  background: #1a1a1e;
  border: 1px solid #2a2a2e;
  border-radius: 16px;
  padding: 0;
  margin-top: 48px;
  overflow: hidden;
}

.scene-terminal .term-titlebar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 18px;
  background: #141417;
  border-bottom: 1px solid #2a2a2e;
}

.scene-terminal .term-dot { width: 12px; height: 12px; border-radius: 50%; }
.scene-terminal .term-dot.r { background: #ef4444; }
.scene-terminal .term-dot.y { background: #eab308; }
.scene-terminal .term-dot.g { background: #22c55e; }

.scene-terminal .term-body {
  padding: 20px 24px;
  font-size: 20px;
  line-height: 1.7;
}

.scene-terminal .term-line { display: flex; gap: 8px; }
.scene-terminal .term-prompt { color: var(--green); }
.scene-terminal .term-cmd { color: #e4e4e7; }
.scene-terminal .term-result { color: #a1a1aa; }
.scene-terminal .term-success { color: var(--green); }
.scene-terminal .term-money { color: #eab308; font-weight: 600; }

.scene-terminal .logo-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 48px;
}

.scene-terminal .printkit-logo {
  font-family: var(--font);
  font-size: 28px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.scene-terminal .printkit-url {
  font-size: 22px;
  color: #71717a;
}


/* --- SCENE: Revenue Chart --- */
.scene-revenue {
  background: var(--white);
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100%;
  padding: 80px;
}

.scene-revenue .rev-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 22px;
  font-weight: 600;
  color: var(--green-dark);
  background: #f0fdf4;
  border: 2px solid #bbf7d0;
  border-radius: 100px;
  padding: 8px 24px;
  margin-bottom: 48px;
  width: fit-content;
}

.scene-revenue .ad-headline {
  font-size: 82px;
  font-weight: 700;
  line-height: 1.05;
  letter-spacing: -3px;
  color: var(--black);
  margin-bottom: 40px;
  max-width: 880px;
}

.scene-revenue .ad-subhead {
  font-size: 28px;
  line-height: 1.5;
  color: var(--zinc-500);
  max-width: 780px;
  margin-bottom: auto;
}

.scene-revenue .chart-area {
  display: flex;
  align-items: flex-end;
  gap: 16px;
  height: 260px;
  padding: 0 20px;
  margin-top: 40px;
}

.scene-revenue .chart-bar-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  height: 100%;
  justify-content: flex-end;
}

.scene-revenue .chart-bar {
  width: 100%;
  border-radius: 8px 8px 4px 4px;
  background: var(--zinc-200);
  position: relative;
}

.scene-revenue .chart-bar.accent { background: var(--black); }
.scene-revenue .chart-bar.green { background: var(--green); }

.scene-revenue .chart-label { font-size: 18px; color: var(--zinc-400); font-weight: 500; }
.scene-revenue .chart-value { font-size: 18px; font-weight: 700; color: var(--black); margin-bottom: 4px; }

.scene-revenue .logo-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 48px;
}

.scene-revenue .printkit-logo {
  font-size: 28px;
  font-weight: 700;
  color: var(--black);
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.scene-revenue .printkit-url { font-size: 22px; color: var(--zinc-400); }


/* --- SCENE: The Stack (Flow) --- */
.scene-stack {
  background: #0c0c0c;
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100%;
  padding: 80px;
}

.scene-stack .stack-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 22px;
  font-weight: 500;
  color: var(--purple);
  border: 2px solid rgba(168,85,247,0.3);
  border-radius: 100px;
  padding: 8px 24px;
  margin-bottom: 48px;
  width: fit-content;
}

.scene-stack .ad-headline {
  font-family: var(--font);
  font-size: 82px;
  font-weight: 700;
  line-height: 1.05;
  letter-spacing: -3px;
  color: var(--white);
  margin-bottom: 40px;
  max-width: 900px;
}

.scene-stack .ad-subhead {
  font-size: 28px;
  line-height: 1.5;
  color: #a1a1aa;
  max-width: 780px;
  margin-bottom: auto;
}

.scene-stack .flow-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  margin-top: 48px;
}

.scene-stack .flow-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  text-align: center;
}

.scene-stack .flow-icon {
  width: 100px;
  height: 100px;
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 44px;
  border: 2px solid #2a2a2e;
  background: #1a1a1e;
}

.scene-stack .flow-icon.img-icon { background: linear-gradient(135deg, #1e3a5f, #1a1a1e); border-color: #3b82f6; }
.scene-stack .flow-icon.api-icon { background: linear-gradient(135deg, #2d1b4e, #1a1a1e); border-color: var(--purple); }
.scene-stack .flow-icon.print-icon { background: linear-gradient(135deg, #1b3d2e, #1a1a1e); border-color: var(--green); }
.scene-stack .flow-icon.money-icon { background: linear-gradient(135deg, #3d2e1b, #1a1a1e); border-color: #eab308; }

.scene-stack .flow-label { font-size: 22px; font-weight: 600; color: var(--white); }
.scene-stack .flow-sublabel { font-size: 16px; color: #71717a; }
.scene-stack .flow-arrow { font-size: 32px; color: #3f3f46; }

.scene-stack .logo-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 48px;
}

.scene-stack .printkit-logo {
  font-family: var(--font);
  font-size: 28px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.scene-stack .printkit-url { font-size: 22px; color: #71717a; }


/* --- SCENE: Product Grid --- */
.scene-products {
  background: var(--white);
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100%;
  padding: 60px 70px;
}

.scene-products .prod-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 20px;
  font-weight: 600;
  color: var(--orange);
  background: #fff7ed;
  border: 2px solid #fed7aa;
  border-radius: 100px;
  padding: 6px 20px;
  margin-bottom: 28px;
  width: fit-content;
}

.scene-products .ad-headline {
  font-size: 68px;
  font-weight: 700;
  line-height: 1.05;
  letter-spacing: -3px;
  color: var(--black);
  margin-bottom: 16px;
  max-width: 880px;
}

.scene-products .ad-subhead {
  font-size: 24px;
  line-height: 1.4;
  color: var(--zinc-500);
  max-width: 780px;
  margin-bottom: auto;
}

.scene-products .product-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-top: 24px;
}

.scene-products .product-card {
  background: var(--zinc-50);
  border: 2px solid var(--zinc-200);
  border-radius: 14px;
  padding: 18px 14px;
  text-align: center;
}

.scene-products .product-icon {
  width: 56px;
  height: 56px;
  margin: 0 auto 10px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  background: var(--zinc-100);
}

.scene-products .product-name { font-size: 18px; font-weight: 600; color: var(--black); margin-bottom: 2px; }
.scene-products .product-price { font-size: 16px; color: var(--green-dark); font-weight: 600; }
.scene-products .product-earn { font-size: 13px; color: var(--zinc-400); margin-top: 2px; }

.scene-products .logo-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 28px;
}

.scene-products .printkit-logo {
  font-size: 28px;
  font-weight: 700;
  color: var(--black);
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.scene-products .printkit-url { font-size: 22px; color: var(--zinc-400); }


/* --- SCENE: Bold Statement --- */
.scene-bold {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  padding: 100px;
  text-align: center;
  background: var(--black);
  position: relative;
}

.scene-bold .bold-headline {
  font-size: 96px;
  font-weight: 800;
  line-height: 1.0;
  letter-spacing: -4px;
  color: var(--white);
  max-width: 900px;
  margin-bottom: 48px;
}

.scene-bold .bold-sub {
  font-size: 36px;
  line-height: 1.4;
  color: #d4d4d8;
  max-width: 760px;
  margin-bottom: auto;
}

.scene-bold .bold-cta {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 26px;
  font-weight: 600;
  color: var(--black);
  background: var(--white);
  padding: 18px 40px;
  border-radius: 12px;
  margin-top: 60px;
}

.scene-bold .logo-bar {
  position: absolute;
  bottom: 80px;
  left: 80px;
  right: 80px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.scene-bold .printkit-logo {
  font-size: 28px;
  font-weight: 700;
  color: #3f3f46;
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.scene-bold .printkit-url {
  font-size: 22px;
  color: #3f3f46;
}


/* ============================================ */
/* FAVORITES GALLERY                            */
/* ============================================ */
.gallery-view {
  display: none;
  min-height: 100vh;
  background: #0c0c0c;
  color: var(--white);
  padding: 0;
}

.gallery-view.active {
  display: block;
}

.gallery-topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(12,12,12,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid #1a1a1e;
  padding: 16px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.gallery-topbar-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.gallery-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.gallery-count {
  font-size: 13px;
  color: var(--zinc-500);
  font-variant-numeric: tabular-nums;
}

.gallery-back {
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  color: var(--zinc-400);
  background: #1a1a1e;
  border: 1px solid #2a2a2e;
  border-radius: 8px;
  padding: 8px 16px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.gallery-back:hover { color: var(--white); border-color: #3f3f46; }

.gallery-grid {
  padding: 40px;
  display: flex;
  flex-direction: column;
  gap: 80px;
}

.gallery-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  color: var(--zinc-600);
  text-align: center;
  gap: 16px;
}

.gallery-empty-icon { font-size: 48px; opacity: 0.3; }
.gallery-empty-text { font-size: 16px; }
.gallery-empty-hint { font-size: 13px; color: var(--zinc-700); }

/* Individual fave item */
.fave-item {
  position: relative;
}

.fave-row {
  display: flex;
  gap: 40px;
  align-items: flex-start;
}

.fave-ad-wrap {
  flex-shrink: 0;
  width: 400px;
  height: 400px;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid #2a2a2e;
  position: relative;
}

.fave-ad-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.fave-meta {
  flex: 1;
  padding-top: 8px;
}

.fave-scene-tag {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--green);
  margin-bottom: 12px;
}

.fave-headline {
  font-size: 28px;
  font-weight: 700;
  line-height: 1.15;
  letter-spacing: -1px;
  color: var(--white);
  margin-bottom: 12px;
}

.fave-sub {
  font-size: 15px;
  line-height: 1.6;
  color: var(--zinc-400);
  margin-bottom: 24px;
  max-width: 500px;
}

.fave-actions {
  display: flex;
  gap: 8px;
}

.fave-action-btn {
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  color: var(--zinc-400);
  background: #1a1a1e;
  border: 1px solid #2a2a2e;
  border-radius: 6px;
  padding: 6px 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.fave-action-btn:hover { color: var(--white); border-color: #3f3f46; }
.fave-action-btn.delete:hover { color: var(--red); border-color: var(--red); }

/* Scrollbars */
.copy-list::-webkit-scrollbar { width: 4px; }
.copy-list::-webkit-scrollbar-track { background: transparent; }
.copy-list::-webkit-scrollbar-thumb { background: var(--zinc-300); border-radius: 2px; }

.sidebar-scroll::-webkit-scrollbar { width: 4px; }
.sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: var(--zinc-200); border-radius: 2px; }

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: var(--black);
  color: var(--white);
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  z-index: 1000;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Fave sidebar items */
.fave-sidebar-item {
  display: flex;
  gap: 10px;
  align-items: center;
  padding: 8px;
  border: 1px solid var(--zinc-200);
  border-radius: 8px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.15s;
}
.fave-sidebar-item:hover { background: var(--zinc-50); border-color: var(--zinc-400); }

.fave-sidebar-thumb {
  width: 48px;
  height: 48px;
  border-radius: 4px;
  object-fit: cover;
  flex-shrink: 0;
}

.fave-sidebar-info { flex: 1; min-width: 0; }

.fave-sidebar-headline {
  font-size: 11px;
  font-weight: 600;
  color: var(--black);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.fave-sidebar-scene {
  font-size: 10px;
  color: var(--zinc-400);
}

.fave-sidebar-delete {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: none;
  color: var(--zinc-300);
  font-size: 14px;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.1s;
  flex-shrink: 0;
}
.fave-sidebar-delete:hover { color: var(--red); background: #fef2f2; }

/* Custom copy editing */
.copy-add-row {
  display: flex;
  gap: 4px;
  margin-top: 8px;
}

.copy-add-input {
  flex: 1;
  font-family: var(--font);
  font-size: 12px;
  padding: 7px 10px;
  border: 1px solid var(--zinc-200);
  border-radius: 6px;
  background: var(--white);
  color: var(--black);
  outline: none;
  transition: border-color 0.15s;
}
.copy-add-input:focus { border-color: var(--green); }
.copy-add-input::placeholder { color: var(--zinc-400); }

.copy-add-btn {
  font-family: var(--font);
  font-size: 11px;
  font-weight: 600;
  color: var(--green-dark);
  background: #f0fdf4;
  border: 1px solid #bbf7d0;
  border-radius: 6px;
  padding: 7px 12px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.copy-add-btn:hover { background: #dcfce7; border-color: #86efac; }

.copy-paste-btn {
  font-family: var(--font);
  font-size: 11px;
  font-weight: 500;
  color: var(--zinc-500);
  background: var(--zinc-50);
  border: 1px dashed var(--zinc-300);
  border-radius: 6px;
  padding: 7px 12px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  margin-top: 4px;
  width: 100%;
  text-align: center;
}
.copy-paste-btn:hover { border-color: var(--zinc-400); color: var(--zinc-700); background: var(--zinc-100); }

.copy-paste-area {
  display: none;
  margin-top: 6px;
}
.copy-paste-area.open { display: block; }

.copy-paste-textarea {
  width: 100%;
  font-family: var(--font);
  font-size: 12px;
  line-height: 1.5;
  padding: 10px;
  border: 1px solid var(--zinc-200);
  border-radius: 6px;
  background: var(--white);
  color: var(--black);
  resize: vertical;
  min-height: 80px;
  outline: none;
  transition: border-color 0.15s;
}
.copy-paste-textarea:focus { border-color: var(--green); }
.copy-paste-textarea::placeholder { color: var(--zinc-400); }

.copy-paste-actions {
  display: flex;
  gap: 4px;
  margin-top: 4px;
}

.copy-option.custom {
  position: relative;
  padding-right: 32px;
}

.copy-option.custom::before {
  content: '';
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  margin-right: 6px;
  vertical-align: middle;
  flex-shrink: 0;
}

.copy-option-delete {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: none;
  color: var(--zinc-300);
  font-size: 14px;
  cursor: pointer;
  border-radius: 3px;
  opacity: 0;
  transition: all 0.1s;
}
.copy-option:hover .copy-option-delete { opacity: 1; }
.copy-option-delete:hover { color: var(--red); background: #fef2f2; }

/* AI generation */
.ai-generate-btn {
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  color: var(--purple);
  background: #faf5ff;
  border: 1px dashed #c084fc;
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
  width: 100%;
  text-align: center;
  margin-top: 6px;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.ai-generate-btn:hover { background: #f3e8ff; border-color: var(--purple); }
.ai-generate-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  border-style: solid;
}
.ai-generate-btn .spinner {
  width: 14px;
  height: 14px;
  border: 2px solid #c084fc;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

.ai-key-row {
  display: flex;
  gap: 4px;
  align-items: center;
  margin-bottom: 12px;
}

.ai-key-input {
  flex: 1;
  font-family: var(--mono);
  font-size: 11px;
  padding: 7px 10px;
  border: 1px solid var(--zinc-200);
  border-radius: 6px;
  background: var(--white);
  color: var(--black);
  outline: none;
  transition: border-color 0.15s;
}
.ai-key-input:focus { border-color: var(--purple); }
.ai-key-input::placeholder { color: var(--zinc-400); font-family: var(--font); }

.ai-key-save {
  font-family: var(--font);
  font-size: 11px;
  font-weight: 600;
  color: var(--white);
  background: var(--purple);
  border: none;
  border-radius: 6px;
  padding: 7px 14px;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.15s;
}
.ai-key-save:hover { opacity: 0.85; }

.ai-key-status {
  font-size: 11px;
  color: var(--green-dark);
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 12px;
}

.ai-angle-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--purple);
  background: #faf5ff;
  border: 1px solid #e9d5ff;
  border-radius: 4px;
  padding: 2px 6px;
  margin-left: 6px;
}

.copy-option.ai-generated::before {
  content: '';
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--purple);
  margin-right: 6px;
  vertical-align: middle;
  flex-shrink: 0;
}

/* --- SCENE: Code Block --- */
.scene-code {
  background: #0c0c0f;
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100%;
  padding: 70px 80px;
  position: relative;
}

.scene-code::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 25% 0%, rgba(168,85,247,0.07) 0%, transparent 50%),
    radial-gradient(ellipse at 75% 100%, rgba(59,130,246,0.06) 0%, transparent 50%);
  pointer-events: none;
}

.scene-code .code-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 20px;
  font-weight: 600;
  color: var(--purple);
  background: rgba(168,85,247,0.1);
  border: 1px solid rgba(168,85,247,0.25);
  border-radius: 100px;
  padding: 6px 22px;
  margin-bottom: 28px;
  width: fit-content;
  position: relative;
}

.scene-code .ad-headline {
  font-size: 64px;
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -2.5px;
  color: var(--white);
  margin-bottom: 32px;
  max-width: 860px;
  position: relative;
}

.scene-code .ad-subhead {
  font-size: 24px;
  line-height: 1.5;
  color: #888;
  margin-bottom: 32px;
  max-width: 700px;
  position: relative;
}

.scene-code .code-editor {
  flex: 1;
  background: #16161e;
  border: 1px solid #2a2a35;
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
  box-shadow: 0 0 80px rgba(168,85,247,0.08), 0 8px 32px rgba(0,0,0,0.4);
}

.scene-code .code-titlebar {
  display: flex;
  align-items: center;
  padding: 14px 18px;
  background: #1e1e28;
  border-bottom: 1px solid #2a2a35;
  gap: 8px;
}

.scene-code .code-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
}
.scene-code .code-dot.r { background: #ef4444; }
.scene-code .code-dot.y { background: #eab308; }
.scene-code .code-dot.g { background: #22c55e; }

.scene-code .code-tab {
  font-family: var(--mono);
  font-size: 13px;
  color: #888;
  background: #16161e;
  padding: 6px 16px;
  border-radius: 6px;
  margin-left: 12px;
  border-bottom: 2px solid var(--purple);
}

.scene-code .code-body {
  padding: 24px;
  font-family: var(--mono);
  font-size: 19px;
  line-height: 1.7;
  flex: 1;
}

.scene-code .code-line {
  display: flex;
  gap: 12px;
}

.scene-code .line-num {
  color: #3a3a45;
  user-select: none;
  min-width: 28px;
  text-align: right;
}

.scene-code .code-text {
  white-space: pre;
}

.scene-code .kw { color: #c084fc; }
.scene-code .fn { color: #60a5fa; }
.scene-code .str { color: #4ade80; }
.scene-code .cm { color: #525263; font-style: italic; }
.scene-code .num { color: #fb923c; }
.scene-code .op { color: #888; }
.scene-code .prop { color: #f9a8d4; }
.scene-code .var { color: #e2e8f0; }

.scene-code .logo-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 24px;
  position: relative;
}

.scene-code .printkit-logo {
  font-size: 26px;
  font-weight: 700;
  color: #52525b;
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.scene-code .printkit-url { font-size: 20px; color: #52525b; }


/* --- SCENE: Gradient Mesh --- */
.scene-mesh {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 100px 90px;
  position: relative;
  background:
    radial-gradient(ellipse at 20% 25%, rgba(168,85,247,0.4) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 15%, rgba(59,130,246,0.33) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 85%, rgba(34,197,94,0.35) 0%, transparent 50%),
    radial-gradient(ellipse at 75% 55%, rgba(249,115,22,0.22) 0%, transparent 40%),
    radial-gradient(ellipse at 10% 70%, rgba(59,130,246,0.18) 0%, transparent 45%),
    #111114;
}

.scene-mesh::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-conic-gradient(rgba(255,255,255,0.015) 0 25%, transparent 0 50%);
  background-size: 4px 4px;
  pointer-events: none;
}

.scene-mesh::after {
  content: '';
  position: absolute;
  inset: 0;
  border: 1px solid rgba(255,255,255,0.06);
  pointer-events: none;
}

.scene-mesh .mesh-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 20px;
  font-weight: 500;
  color: rgba(255,255,255,0.7);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 100px;
  padding: 8px 24px;
  margin-bottom: 40px;
  backdrop-filter: blur(8px);
  position: relative;
}

.scene-mesh .ad-headline {
  font-size: 88px;
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -3.5px;
  color: var(--white);
  max-width: 900px;
  margin-bottom: 36px;
  position: relative;
  text-shadow: 0 2px 40px rgba(255,255,255,0.08);
}

.scene-mesh .ad-subhead {
  font-size: 30px;
  line-height: 1.5;
  color: rgba(255,255,255,0.55);
  max-width: 700px;
  position: relative;
}

.scene-mesh .logo-bar {
  position: absolute;
  bottom: 70px;
  left: 90px;
  right: 90px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.scene-mesh .printkit-logo {
  font-size: 28px;
  font-weight: 700;
  color: rgba(255,255,255,0.4);
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.scene-mesh .printkit-url { font-size: 20px; color: rgba(255,255,255,0.25); }


/* ===== TEXT OVERFLOW FIX ===== */
/* Headlines auto-shrink when they're too long */
.ad-headline.text-sm { font-size: 64px !important; }
.ad-headline.text-xs { font-size: 52px !important; }
.bold-headline.text-sm { font-size: 76px !important; }
.bold-headline.text-xs { font-size: 60px !important; }

/* ===== OGILVY SCENE ===== */
.scene-ogilvy {
  background: #faf9f6;

  flex-direction: column;
  justify-content: center;

}

.scene-ogilvy .ogilvy-rule-top {

.scene-ogilvy .ad-headline {

  color: #1a1a1a;

}

.scene-ogilvy .ogilvy-body {
  font-family: var(--font);
  font-size: 32px;

}

.scene-ogilvy .ogilvy-rule-bottom {
  width: 80px;
  height: 3px;

.scene-ogilvy .logo-bar {

  align-items: center;
  justify-content: space-between;

}

.scene-ogilvy .printkit-logo {
  font-family: var(--font);
  font-size: 26px;
  font-weight: 700;

  letter-spacing: -0.5px;
  display: flex;

}

.scene-ogilvy .printkit-url {
  font-family: var(--font);

}

/* ===== TINDER MODE ===== */
.tinder-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(12px);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.tinder-overlay.active { display: flex; }

.tinder-header {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: var(--white);
}

.tinder-progress {
  font-size: 14px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  color: var(--zinc-400);
}

.tinder-angle {
  font-size: 12px;
  color: var(--purple);
  background: rgba(168,85,247,0.15);
  border: 1px solid rgba(168,85,247,0.3);
  border-radius: 100px;
  padding: 4px 14px;
  font-weight: 500;
}

.tinder-close {
  font-family: var(--font);
  font-size: 13px;
  color: var(--zinc-500);
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  padding: 8px 16px;
  cursor: pointer;
  transition: all 0.15s;
}
.tinder-close:hover { color: var(--white); background: rgba(255,255,255,0.15); }

.tinder-card-area {
  position: relative;
  width: 480px;
  height: 480px;
  flex-shrink: 0;
}

.tinder-card {
  position: absolute;
  inset: 0;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
  cursor: grab;
}

.tinder-card.swiping-right {
  transform: translateX(600px) rotate(15deg);
  opacity: 0;
}
.tinder-card.swiping-left {
  transform: translateX(-600px) rotate(-15deg);
  opacity: 0;
}

.tinder-card .ad-content {
  width: 1080px;
  height: 1080px;
  transform: scale(0.4444);
  transform-origin: top left;
}

.tinder-stamp {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-12deg) scale(0);
  font-size: 72px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 4px;
  padding: 12px 32px;
  border: 6px solid;
  border-radius: 12px;
  pointer-events: none;
  opacity: 0;

function getCustomCopy(field) {

  catch { return []; }
}

function saveCustomCopy(field, items) {
  localStorage.setItem(`printkit-custom-${field}`, JSON.stringify(items));
}

// Hidden built-in lines (indices into ORIGINAL_COPY that the user has removed)
function getHiddenOriginals(field) {
  try { return JSON.parse(localStorage.getItem(`printkit-hidden-${field}`) || '[]'); }
  catch { return []; }

// Merged copy = visible originals + custom.
// We need to track the mapping so we can figure out which original index a visible item maps to.
const copy = { pre: [], head: [], sub: [] };
// Maps visible index -> { type: 'original'|'custom', sourceIdx: number }
const copyMap = { pre: [], head: [], sub: [] };

function rebuildCopy() {
  ['pre', 'head', 'sub'].forEach(field => {
    const hidden = new Set(getHiddenOriginals(field));
    const custom = getCustomCopy(field);
    copy[field] = [];
    copyMap[field] = [];

    ORIGINAL_COPY[field].forEach((text, i) => {
      if (!hidden.has(i)) {
        copyMap[field].push({ type: 'original', sourceIdx: i });
        copy[field].push(text);
      }
    });

    custom.forEach((text, i) => {
      copyMap[field].push({ type: 'custom', sourceIdx: i });
      copy[field].push(text);
    });
  });
}

// ===== HELPERS =====
function esc(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function nl2br(str) {
  return esc(str).replace(/\n/g, '<br>');
}

// Auto-shrink headlines that are too long
function headlineSizeClass(text, sceneType) {
  if (!text) return '';
  const len = text.replace(/\n/g, ' ').length;
  if (sceneType === 'bold') {
    if (len > 50) return 'text-xs';
    if (len > 35) return 'text-sm';
  } else if (sceneType === 'ogilvy') {
    if (len > 60) return 'text-xs';
    if (len > 40) return 'text-sm';
  } else {
    if (len > 55) return 'text-xs';
    if (len > 40) return 'text-sm';
  }
  return '';
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ===== ACTIONS =====
function setScene(key) {
  state.scene = key;
  renderAd();
  renderSidebar();
}

function switchSidebar(tab) {
  state.sidebarTab = tab;
  state.openList = null;
  renderSidebar();
}

function cycleField(field, dir) {
  const len = copy[field].length;
  const wasLast = state[field] === len - 1;
  state[field] = (state[field] + dir + len) % len;
  renderAd();
  if (state.sidebarTab === 'copy') renderSidebar();

  // Auto-generate when cycling forward past the last item
  if (wasLast && dir === 1 && getApiKey() && !generating[field]) {
    generateCopy(field);
  }
}

function selectCopy(field, idx) {
  state[field] = idx;
  state.openList = null;
  renderAd();
  renderSidebar();
}

function toggleList(field) {
  state.openList = state.openList === field ? null : field;
  if (state.sidebarTab !== 'copy') state.sidebarTab = 'copy';
  renderSidebar();
}

function toggleHeart() {
  state.showHeart = !state.showHeart;
  renderAd();
  renderSidebar();
  toast(state.showHeart ? 'Heart logo on' : 'Heart logo off');
}

function togglePaste(field) {
  state.pasteOpen = state.pasteOpen === field ? null : field;
  renderSidebar();
}

function addCustomCopy(field) {
  const input = document.getElementById(`add-${field}`);
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;

  const custom = getCustomCopy(field);
  custom.push(text);
  saveCustomCopy(field, custom);
  rebuildCopy();

  // Select the newly added item
  state[field] = copy[field].length - 1;
  renderAd();
  renderSidebar();
  toast('Added!');
}

function bulkPasteCopy(field) {
  const textarea = document.getElementById(`paste-text-${field}`);
  if (!textarea) return;
  const lines = textarea.value.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  if (lines.length === 0) return;

  const custom = getCustomCopy(field);
  lines.forEach(line => custom.push(line));
  saveCustomCopy(field, custom);
  rebuildCopy();

  state.pasteOpen = null;
  // Select first of the pasted batch
  state[field] = copy[field].length - lines.length;
  renderAd();
  renderSidebar();
  toast(`Added ${lines.length} line${lines.length !== 1 ? 's' : ''}!`);
}

function deleteCopyLine(field, visibleIdx) {
  const mapping = copyMap[field][visibleIdx];
  if (!mapping) return;

  if (mapping.type === 'custom') {
    const custom = getCustomCopy(field);
    custom.splice(mapping.sourceIdx, 1);
    saveCustomCopy(field, custom);
  } else {
    // Hide a built-in line
    const hidden = getHiddenOriginals(field);
    hidden.push(mapping.sourceIdx);
    saveHiddenOriginals(field, hidden);
  }

  rebuildCopy();

  if (state[field] >= copy[field].length) {
    state[field] = Math.max(0, copy[field].length - 1);
  }
  renderAd();
  renderSidebar();
  toast('Removed');
}

function restoreAllOriginals(field) {
  saveHiddenOriginals(field, []);
  rebuildCopy();
  state[field] = 0;
  renderAd();
  renderSidebar();
  toast('Restored all originals');
}

function randomize() {
  state.pre = Math.floor(Math.random() * copy.pre.length);
  state.head = Math.floor(Math.random() * copy.head.length);
  state.sub = Math.floor(Math.random() * copy.sub.length);
  renderAd();
  if (state.sidebarTab === 'copy') renderSidebar();
  toast('Randomized!');
}

// ===== AI COPY GENERATION =====
function getApiKey() {
  return localStorage.getItem('printkit-anthropic-key') || '';
}

function saveApiKey(key) {
  localStorage.setItem('printkit-anthropic-key', key.trim());
}

// Track how many batches we've generated per field to rotate angles
function getGenCount(field) {
  return parseInt(localStorage.getItem(`printkit-gen-count-${field}`) || '0');
}

function bumpGenCount(field) {
  const n = getGenCount(field) + 1;
  localStorage.setItem(`printkit-gen-count-${field}`, String(n));
  return n;
}

function getAngle(field) {
  const angles = AI_ANGLES[field];
  const count = getGenCount(field);
  return angles[count % angles.length];
}

function buildPrompt(field) {
  const angle = getAngle(field);

  // Sample 5-8 existing lines as voice examples, biased toward originals
  const existing = copy[field];
  const sampleSize = Math.min(8, existing.length);
  const shuffled = [...existing].sort(() => Math.random() - 0.5);
  const examples = shuffled.slice(0, sampleSize);

  const fieldDescriptions = {
    pre: 'short pre-header pills (2-6 words) that appear above headlines on 1080x1080 social ads. These are tiny text in a pill/badge shape above the main headline.',
    head: 'headlines for 1080x1080 social ads. These are the BIG text — 82-96px on dark or white backgrounds. Max ~10 words per line. If it works as a two-liner, use a forward slash / to indicate the line break (most headlines are 2 lines).',
    sub: 'subheads for 1080x1080 social ads. These appear below the headline in smaller text. 2-3 sentences max. They expand on the headline with specifics.'
  };

  const fieldRules = {
    pre: `RULES FOR PILLS:
- 2-6 words each. These are TINY. They hit in a glance.
- No periods unless it's deliberate staccato rhythm ("Print. Money.")
- These set the tone BEFORE the headline lands
- The best ones make you pause for half a second`,
    head: `RULES FOR HEADLINES:
- Max ~10 words. If it works as a two-liner, use a forward slash / to indicate the line break (encouraged for rhythm)
- These are displayed at 82-96px. Every word earns its place.
- The best headlines work on two levels — surface meaning plus a smarter read
- Vary structure wildly: fragments, questions, declarations, stolen forms
- NO exclamation points. Confidence doesn't shout.`,
    sub: `RULES FOR SUBHEADS:
- 2-3 sentences max. Displayed at 28-30px below the headline.
- Be SPECIFIC: mention the URL, the agent, $8-$60 per order, 6 products, US lab, 15-year-old print company
- The best subheads feel like the smartest paragraph in a blog post you'd actually share
- They should work as standalone copy even without the headline above them`
  };

  return `You are Peggy Olson — if Peggy Olson wrote copy for developer tools in 2026. Brilliant, restless, too smart for the room. You write for PrintKit, an agent-first print API at printkit.dev.

YOUR VOICE: The Economist's display campaigns meet McSweeney's Internet Tendency meet Stripe's landing page. Cerebral but commercial. Witty but never winking. The humor earns the sale — it doesn't replace it. You respect the reader's intelligence. You never use buzzwords, never use exclamation points, never sound like a content marketing blog.

THE PRODUCT: PrintKit lets AI agents sell physical photo prints. One URL (printkit.dev/llms-full.txt) — an agent reads it, understands 6 product lines (metal prints, wood prints, gallery frames, acrylic blocks, large format prints, photo magazines), places orders autonomously. The developer earns $8-$60 commission per sale. PrintKit handles printing, packing, shipping from their US lab. No SDK, no API keys, no dashboard, no inventory. 15 years of printing experience, now API-first for the agent economy.

You are writing ${fieldDescriptions[field]}.

VOICE EXAMPLES (these are the bar — match or exceed this quality):
${examples.map(e => '- "' + e.replace(/\n/g, ' ') + '"').join('\n')}

CREATIVE ANGLE FOR THIS BATCH: "${angle.name}"
${angle.instruction}

${fieldRules[field]}

QUALITY CONTROL:
- Every line must earn its place. If it sounds like it could be for any SaaS product, kill it.
- Specificity beats cleverness. "Metal prints" beats "products." "$31 commission" beats "revenue."
- The best lines feel inevitable — like they were always the right way to say this.
- Vary rhythm and structure across the batch. Don't let them all sound the same.
- NEVER repeat or closely paraphrase any of the examples above.

Write exactly 18 lines. Output ONLY the lines, one per line. No numbering, no quotes, no commentary.`;
}

async function generateCopy(field) {
  const key = getApiKey();
  if (!key) {
    state.sidebarTab = 'style';
    renderSidebar();
    toast('Add your Anthropic API key first');
    return;
  }

  if (generating[field]) return;
  generating[field] = true;
  renderSidebar();
  toast(`Generating ${field === 'pre' ? 'pills' : field === 'head' ? 'headlines' : 'subheads'}...`);

  try {
    const prompt = buildPrompt(field);

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2048,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error ${response.status}`);
    }

    const data = await response.json();
    const text = data.content?.[0]?.text || '';

    // Parse lines — strip numbering, quotes, empty lines, fix literal \n
    const lines = text
      .split('\n')
      .map(l => l.replace(/^\d+[\.\)]\s*/, '').replace(/^[""\u201c]|[""\u201d]$/g, '').replace(/^- /, '').trim())
      .map(l => l.replace(/\\n/g, '\n'))  // convert literal \n to real newlines
      .map(l => field === 'head' ? l.replace(/\s*\/\s*/g, '\n') : l)  // convert / to line breaks in headlines
      .filter(l => l.length > 0 && l.length < 300);

    if (lines.length === 0) throw new Error('No lines generated');

    bumpGenCount(field);
    const angleName = AI_ANGLES[field][(getGenCount(field) - 1) % AI_ANGLES[field].length].name;

    // Open Tinder mode to curate the batch
    openTinder(field, lines, angleName);
    toast(`${lines.length} lines generated — swipe to curate`);
  } catch (err) {
    console.error('AI generation error:', err);
    toast(`Error: ${err.message}`);
  } finally {
    generating[field] = false;
    renderAd();
    renderSidebar();
  }
}

// ===== FAVORITES =====
async function saveToFaves() {
  const frame = document.getElementById('adFrame');
  const content = document.getElementById('adContent');

  // Capture thumbnail
  frame.style.width = '1080px';
  frame.style.height = '1080px';
  content.style.transform = 'none';

  toast('Saving...');

  try {
    const canvas = await html2canvas(content, {
      width: 1080, height: 1080, scale: 0.5,
      useCORS: true, backgroundColor: null, logging: false
    });

    const thumb = canvas.toDataURL('image/jpeg', 0.85);

    const faves = getFaves();
    faves.unshift({
      id: Date.now(),
      scene: state.scene,
      sceneName: scenes[state.scene].name,
      pre: state.pre,
      head: state.head,
      sub: state.sub,
      showHeart: state.showHeart,
      headline: copy.head[state.head],
      subhead: copy.sub[state.sub],
      pill: copy.pre[state.pre],
      thumb: thumb,
      savedAt: new Date().toISOString()
    });
    saveFaves(faves);

    toast('Saved to favorites!');
    if (state.sidebarTab === 'faves') renderSidebar();
  } catch (err) {
    console.error(err);
    toast('Save failed');
  } finally {
    frame.style.width = '540px';
    frame.style.height = '540px';
    content.style.transform = 'scale(0.5)';
  }
}

function loadFave(idx) {
  const faves = getFaves();
  const f = faves[idx];
  if (!f) return;
  state.scene = f.scene;
  state.pre = f.pre;
  state.head = f.head;
  state.sub = f.sub;
  state.showHeart = f.showHeart !== undefined ? f.showHeart : true;
  renderAd();
  renderSidebar();
  toast('Loaded!');
}

function deleteFave(idx) {
  const faves = getFaves();
  faves.splice(idx, 1);
  saveFaves(faves);
  renderSidebar();
  toast('Deleted');
}

// ===== GALLERY VIEW =====
function showGallery() {
  state.view = 'gallery';
  document.getElementById('appView').style.display = 'none';
  document.getElementById('galleryView').classList.add('active');
  renderGallery();
}

function showEditor() {
  state.view = 'editor';
  document.getElementById('appView').style.display = 'flex';
  document.getElementById('galleryView').classList.remove('active');
}

function renderGallery() {
  const faves = getFaves();
  const grid = document.getElementById('galleryGrid');
  const count = document.getElementById('galleryCount');
  count.textContent = `${faves.length} ad${faves.length !== 1 ? 's' : ''}`;

  if (faves.length === 0) {
    grid.innerHTML = `
      <div class="gallery-empty">
        <div class="gallery-empty-icon">&#9733;</div>
        <div class="gallery-empty-text">No favorites yet</div>
        <div class="gallery-empty-hint">Go back to the editor and click Fave to save ads here</div>
      </div>
    `;
    return;
  }

  grid.innerHTML = faves.map((f, i) => `
    <div class="fave-item">
      <div class="fave-row">
        <div class="fave-ad-wrap">
          <img src="${f.thumb}" alt="${esc(f.headline.replace(/\n/g, ' '))}">
        </div>
        <div class="fave-meta">
          <div class="fave-scene-tag">${esc(f.sceneName)}</div>
          <div class="fave-headline">${esc(f.headline.replace(/\n/g, ' '))}</div>
          <div class="fave-sub">${esc(f.subhead)}</div>
          <div class="fave-actions">
            <button class="fave-action-btn" onclick="loadFaveAndEdit(${i})">Edit</button>
            <button class="fave-action-btn" onclick="exportFave(${i})">Export PNG</button>
            <button class="fave-action-btn delete" onclick="deleteFaveFromGallery(${i})">Delete</button>
          </div>
        </div>
      </div>
      </div>
    </div>
  `).join('');
}

function loadFaveAndEdit(idx) {
  loadFave(idx);
  showEditor();
}

function exportFave(idx) {
  const faves = getFaves();
  const f = faves[idx];
  if (!f) return;

  // Load the fave into the editor, export, then come back
  loadFave(idx);
  showEditor();
  setTimeout(() => exportAd(), 100);
}

function deleteFaveFromGallery(idx) {
  const faves = getFaves();
  faves.splice(idx, 1);
  saveFaves(faves);
  renderGallery();
  toast('Deleted');
}

// ===== EXPORT =====
async function exportAd() {
  const frame = document.getElementById('adFrame');
  const content = document.getElementById('adContent');

  frame.style.width = '1080px';
  frame.style.height = '1080px';
  content.style.transform = 'none';

  toast('Exporting...');

  try {
    const canvas = await html2canvas(content, {
      width: 1080, height: 1080, scale: 1,
      useCORS: true, backgroundColor: null, logging: false
    });

    const link = document.createElement('a');
    link.download = `printkit-ad-${state.scene}-${Date.now()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();

    toast('Exported 1080\u00d71080 PNG!');
  } catch (err) {
    console.error(err);
    toast('Export failed \u2014 try screenshot instead');
  } finally {
    frame.style.width = '540px';
    frame.style.height = '540px';
    content.style.transform = 'scale(0.5)';
  }
}

// ===== TINDER MODE =====
const tinderState = {
  active: false,
  field: null,
  lines: [],
  current: 0,
  kept: [],
  noped: [],
  angleName: ''
};

function openTinder(field, lines, angleName) {
  if (!lines || lines.length === 0) return;
  tinderState.active = true;
  tinderState.field = field;
  tinderState.lines = lines;
  tinderState.current = 0;
  tinderState.kept = [];
  tinderState.noped = [];
  tinderState.angleName = angleName || '';

  const overlay = document.getElementById('tinderOverlay');
  overlay.classList.add('active');
  document.getElementById('tinderDone').style.display = 'none';
  document.getElementById('tinderBody').style.display = '';
  document.getElementById('tinderAngle').textContent = angleName;
  renderTinderCard();
  updateTinderScore();
}

function closeTinder() {
  tinderState.active = false;
  document.getElementById('tinderOverlay').classList.remove('active');

  // Add kept lines as custom copy
  if (tinderState.kept.length > 0) {
    const field = tinderState.field;
    const custom = getCustomCopy(field);
    tinderState.kept.forEach(line => custom.push(line));
    saveCustomCopy(field, custom);
    rebuildCopy();
    // Jump to first new line
    state[field] = copy[field].length - tinderState.kept.length;
    renderAd();
    renderSidebar();
    toast(`+${tinderState.kept.length} lines kept`);
  }
}

function renderTinderCard() {
  const idx = tinderState.current;
  const lines = tinderState.lines;

  if (idx >= lines.length) {
    // Done — show summary
    document.getElementById('tinderBody').style.display = 'none';
    const done = document.getElementById('tinderDone');
    done.style.display = '';
    document.getElementById('tinderDoneTitle').textContent =
      tinderState.kept.length > 0 ? `${tinderState.kept.length} lines kept` : 'No lines kept';
    document.getElementById('tinderDoneStats').textContent =
      `${tinderState.kept.length} kept / ${tinderState.noped.length} skipped out of ${lines.length}`;
    return;
  }

  const line = lines[idx];
  const field = tinderState.field;

  // Update progress
  document.getElementById('tinderProgress').textContent = `${idx + 1} / ${lines.length}`;

  // Preview text below the card
  document.getElementById('tinderTextPreview').textContent = line.replace(/\n/g, ' ');

  // Render the ad in the tinder card using the current scene but with this line swapped in
  const card = document.getElementById('tinderCard');
  const adContent = document.getElementById('tinderAdContent');

  // Temporarily swap the copy to render this line
  const origVal = copy[field][state[field]];
  const origIdx = state[field];

  // Create a temporary state with this line
  const tempCopy = { ...copy };
  const savedField = copy[field][state[field]];

  // Directly render the scene with the tinder line substituted
  copy[field][state[field]] = line;
  const renderer = scenes[state.scene];
  adContent.innerHTML = renderer ? renderer.render() : '';
  copy[field][state[field]] = savedField;

  // Reset card animation state
  card.className = 'tinder-card';
}

function tinderSwipe(direction) {
  if (!tinderState.active || tinderState.current >= tinderState.lines.length) return;

  const card = document.getElementById('tinderCard');
  const line = tinderState.lines[tinderState.current];

  if (direction === 'right') {
    tinderState.kept.push(line);
    card.classList.add('swiping-right');
  } else {
    tinderState.noped.push(line);
    card.classList.add('swiping-left');
  }

  updateTinderScore();

  // After animation, show next card
  setTimeout(() => {
    tinderState.current++;
    renderTinderCard();
  }, 300);
}

function updateTinderScore() {
  document.getElementById('tinderKept').textContent = `${tinderState.kept.length} kept`;
  document.getElementById('tinderNoped').textContent = `${tinderState.noped.length} skipped`;
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  const sceneKeys = { q: 'terminal', w: 'revenue', r: 'stack', t: 'products', y: 'bold', u: 'ogilvy', i: 'code', o: 'mesh' };

  // Escape always goes back to editor
  if (e.key === 'Escape') {
    if (tinderState.active) { closeTinder(); return; }
    if (state.view === 'gallery') { showEditor(); return; }
  }

  // Tinder mode arrow keys
  if (tinderState.active) {
    if (e.key === 'ArrowRight') { e.preventDefault(); tinderSwipe('right'); return; }
    if (e.key === 'ArrowLeft') { e.preventDefault(); tinderSwipe('left'); return; }
    return; // block all other shortcuts while tinder is open
  }

  switch(e.key.toLowerCase()) {
    case '1': cycleField('pre', 1); break;
    case '2': cycleField('head', 1); break;
    case '3': cycleField('sub', 1); break;
    case 'e': if (state.view === 'editor') exportAd(); break;
    case 'f': if (state.view === 'editor') saveToFaves(); break;
    case 'g': state.view === 'editor' ? showGallery() : showEditor(); break;
    case 'h': toggleHeart(); break;
    case ' ':
      e.preventDefault();
      randomize();
      break;
    default:
      if (sceneKeys[e.key.toLowerCase()]) {
        setScene(sceneKeys[e.key.toLowerCase()]);
      }
  }
});

renderAd();
